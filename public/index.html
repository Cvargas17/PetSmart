<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Productos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Control de Productos</h1>
      <p>Administra productos y envía notificaciones a Telegram.</p>
    </header>

    <section class="panel">
      <form id="product-form">
        <input type="hidden" id="product-id" />
        <div class="row">
          <label>Nombre</label>
          <input id="name" type="text" required placeholder="Nombre del producto" />
        </div>
        <div class="row">
          <label>SKU</label>
          <input id="sku" type="text" placeholder="Código SKU" />
        </div>
        <div class="row">
          <label>Cantidad</label>
          <input id="quantity" type="number" min="0" value="0" />
        </div>
        <div class="row">
          <label>Estado</label>
          <select id="status">
            <option value="activo">Activo</option>
            <option value="agotado">Agotado</option>
            <option value="pendiente">Pendiente</option>
          </select>
        </div>
        <div class="row">
          <label>Notas</label>
          <textarea id="notes" rows="2" placeholder="Notas del producto"></textarea>
        </div>
        <div class="actions">
          <button type="submit">Guardar producto</button>
          <button type="button" id="reset-button" class="secondary">Limpiar</button>
        </div>
      </form>
    </section>
    <section class="panel">
      <h2>Control de Puerta</h2>
      <div class="row">
        <button id="open-gate-button">Abrir puerta (manual)</button>
        <button id="close-gate-button" class="secondary">Cerrar puerta (manual)</button>
      </div>
      <div class="row">
        <strong>Estado puerta:</strong> <span id="gate-status">Desconocido</span>
      </div>
      <h3>Schedules</h3>
      <form id="schedule-form">
        <input type="hidden" id="schedule-id" />
        <div class="row">
          <label>Hora (cada hora en punto)</label>
          <select id="schedule-time" required>
            <option value="">Selecciona una hora</option>
            <option value="00:00">00:00</option>
            <option value="01:00">01:00</option>
            <option value="02:00">02:00</option>
            <option value="03:00">03:00</option>
            <option value="04:00">04:00</option>
            <option value="05:00">05:00</option>
            <option value="06:00">06:00</option>
            <option value="07:00">07:00</option>
            <option value="08:00">08:00</option>
            <option value="09:00">09:00</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
            <option value="21:00">21:00</option>
            <option value="22:00">22:00</option>
            <option value="23:00">23:00</option>
          </select>
        </div>
        <div class="actions">
          <button type="submit" id="schedule-submit">Agregar schedule</button>
          <button type="button" id="cancel-schedule-edit" class="secondary hidden">Cancelar</button>
        </div>
      </form>
      <table id="schedules-table">
        <thead>
          <tr><th>Hora</th><th>Activo</th><th>Acciones</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Productos</h2>
      <div id="alert" class="alert hidden"></div>
      <table id="products-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>SKU</th>
            <th>Cant.</th>
            <th>Estado</th>
            <th>Notas</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
